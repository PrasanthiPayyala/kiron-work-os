<?xml version="1.0" encoding="UTF-8"?>
<!-- Kiron Presence tray icon — OFFLINE / SIGNED-OUT state.
     Grey dot ⇒ agent isn't tracking. Either signed out, or the
     tracker crashed / the network is unreachable. Left-click the tray
     re-opens the sign-in window. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#0f172a"/>
  <path d="M9 8h3.5v6.5L18 8h4.3l-6.3 7.3L23 24h-4.2l-4.5-6.7L12.5 19V24H9z" fill="#94a3b8" opacity="0.6"/>
  <!-- Status dot: slate 400. -->
  <circle cx="24" cy="24" r="4.5" fill="#94a3b8" stroke="#0f172a" stroke-width="1.5"/>
</svg>
