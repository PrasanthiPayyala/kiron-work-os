# Build + release the Kiron Presence Client for Windows and macOS.
#
# Triggered on tags matching `desktop-v*` — e.g. `desktop-v0.1.1`.
# Builds unsigned by default. If the signing secrets (see below) are
# configured on the repo, MSI + DMG are signed + notarized as part of
# the same run.
#
# Required repo secrets when you're ready to ship signed builds:
#   TAURI_SIGNING_PRIVATE_KEY          — ed25519 private key generated by
#                                          `npx @tauri-apps/cli signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the above
#   KIRON_CODE_SIGN_CERT_BASE64        — Windows .pfx encoded as base64
#   KIRON_CODE_SIGN_PASSWORD           — Windows .pfx password
#   APPLE_CERTIFICATE                  — Developer ID .p12 encoded as base64
#   APPLE_CERTIFICATE_PASSWORD         — .p12 password
#   APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Innomax Solutions"
#   APPLE_ID                           — Apple ID email (for notarization)
#   APPLE_APP_PASSWORD                 — App-specific password
#   APPLE_TEAM_ID                      — 10-char team ID
#
# See desktop-client/SIGNING.md for how to obtain each.

name: desktop-client-release

on:
  push:
    tags:
      - "desktop-v*"

concurrency:
  # A retagged release supersedes an in-flight one — no need to keep
  # building the older tag.
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_glob: "src-tauri/target/release/bundle/msi/*.msi"
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop-client

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry + target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-client/src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps (Tauri CLI)
        run: npm ci

      # --- Icon generation ---
      # SVG → PNG/ICO/ICNS on every build so we never ship stale icons.
      - name: Install librsvg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install librsvg
      - name: Install librsvg (Windows)
        if: matrix.platform == 'windows-latest'
        # librsvg via chocolatey. Alternatively use Inkscape CLI.
        run: choco install rsvg-convert --no-progress -y
      - name: Rasterize bundle + tray icons
        shell: bash
        run: |
          set -euxo pipefail
          rsvg-convert -w 512 -h 512 src-tauri/icons/svg/icon.svg -o /tmp/icon.png
          npx @tauri-apps/cli icon /tmp/icon.png
          rsvg-convert -w 16 -h 16 src-tauri/icons/svg/tray-active.svg  -o src-tauri/icons/tray-active.png
          rsvg-convert -w 16 -h 16 src-tauri/icons/svg/tray-idle.svg    -o src-tauri/icons/tray-idle.png
          rsvg-convert -w 16 -h 16 src-tauri/icons/svg/tray-offline.svg -o src-tauri/icons/tray-offline.png

      # --- Apple Developer setup (macOS only, requires secrets) ---
      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci build.keychain

      # --- Windows signing cert setup (Windows only, requires secrets) ---
      - name: Import Windows signing cert
        if: matrix.platform == 'windows-latest' && env.KIRON_CODE_SIGN_CERT_BASE64 != ''
        env:
          KIRON_CODE_SIGN_CERT_BASE64: ${{ secrets.KIRON_CODE_SIGN_CERT_BASE64 }}
        shell: pwsh
        run: |
          [System.IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\cert.pfx",
            [System.Convert]::FromBase64String($env:KIRON_CODE_SIGN_CERT_BASE64)
          )
          echo "KIRON_CODE_SIGN_CERT=$env:RUNNER_TEMP\cert.pfx" >> $env:GITHUB_ENV

      # --- Build ---
      - name: Build (Tauri)
        env:
          # Tauri updater signing — signs the .msi.zip / .app.tar.gz so
          # tauri-plugin-updater verifies before applying. Optional at
          # first; without these the bundler still produces installers,
          # they just can't be shipped through the updater path.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows signtool.exe env-var placeholders — filled from the
          # signCommand block in tauri.conf.json.
          KIRON_CODE_SIGN_PASSWORD: ${{ secrets.KIRON_CODE_SIGN_PASSWORD }}
          # macOS notarization — the tauri-bundler handles the ditto,
          # notarytool submit + wait dance when these are set.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx @tauri-apps/cli build --target ${{ matrix.rust_target }}

      # --- Upload artifacts to the release ---
      - name: Attach installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-client/${{ matrix.artifact_glob }}
            desktop-client/src-tauri/target/release/bundle/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
