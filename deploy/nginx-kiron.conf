# nginx site for Kiron Work OS.
#   - serves the built PWA (static) from /var/www/kiron
#   - reverse-proxies /api/* to the FastAPI backend on 127.0.0.1:8787
#   - SPA fallback so client-side routes (/dashboard, /my-work, ...) work
#
# Install:  sudo cp deploy/nginx-kiron.conf /etc/nginx/sites-available/kiron
#           sudo ln -s /etc/nginx/sites-available/kiron /etc/nginx/sites-enabled/
#           # replace kiron.example.com below with your domain, then:
#           sudo nginx -t && sudo systemctl reload nginx
#           sudo certbot --nginx -d kiron.example.com   # adds the TLS block + redirect
#
# certbot rewrites this file to add the 443 server + HTTP->HTTPS redirect.
# The block below is the pre-TLS (port 80) starting point.

server {
    listen 80;
    listen [::]:80;
    server_name kiron.example.com;   # <-- CHANGE to your domain

    root /var/www/kiron;
    index index.html;

    # API → FastAPI. Trailing slash on proxy_pass strips the /api prefix, so the
    # backend sees /auth/login, /bootstrap, etc. (its routes carry no prefix).
    location /api/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # The service worker must never be cached by the browser/CDN, or clients get
    # stuck on an old shell. Hashed assets under /assets/ are immutable.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any non-file route returns index.html for the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable upload ceiling for attachments/avatars.
    client_max_body_size 25m;
}
