# Kiron Work OS — Apache vhost include for cPanel/WHM
#
# Drop this into BOTH userdata include paths so it covers HTTP and HTTPS:
#   /etc/apache2/conf.d/userdata/std/2_4/<cpuser>/<domain>/kiron.conf
#   /etc/apache2/conf.d/userdata/ssl/2_4/<cpuser>/<domain>/kiron.conf
# Then:
#   sudo /scripts/ensure_vhost_includes --user=<cpuser>
#   sudo /scripts/rebuildhttpdconf
#   sudo systemctl reload httpd
#
# Required Apache modules (all standard on WHM EasyApache 4):
#   mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_rewrite, mod_headers.
# Confirm with:  httpd -M | grep -E 'proxy_(http|wstunnel)|rewrite|headers'
#
# Tested on:  Apache 2.4.67 (cPanel), AlmaLinux 9.

ProxyPreserveHost On
ProxyRequests Off

# REST API.
ProxyPass        /api/  http://127.0.0.1:8787/
ProxyPassReverse /api/  http://127.0.0.1:8787/

# WebSocket for chat / notifications / approvals realtime.
# mod_proxy_wstunnel handles HTTP/1.1 Upgrade + RFC 8441 HTTP/2 :protocol
# negotiation. Do NOT use a conditional RewriteRule here — under HTTP/2,
# mod_http2 strips Connection: Upgrade before RewriteCond can read it, so
# the rule never fires and the request 404s. Explicit ProxyPass works on
# both protocol versions.
ProxyPass        /ws    ws://127.0.0.1:8787/ws
ProxyPassReverse /ws    ws://127.0.0.1:8787/ws

RewriteEngine On

# Legacy bookmark redirect (only relevant if you co-host an older PHP CRM
# at /old/; drop this rule if you don't). 302, not 301, so browsers don't
# permanently cache the redirect.
RewriteRule ^/index\.php(/.*)?$ /old/index.php$1 [R=302,L]

# SPA fallback. Use %{DOCUMENT_ROOT}%{REQUEST_URI} to test for file/dir
# existence, NOT %{REQUEST_FILENAME} — at vhost scope the latter is the
# raw URI before any aliasing, so the file-existence check is meaningless
# and every /assets/*.js falls through to /index.html, served as text/html.
# Symptom: PWA loads as a blank screen and Console says "module script
# expected, got text/html". The DOCUMENT_ROOT+REQUEST_URI form fixes it.
RewriteCond %{REQUEST_URI} !^/api/
RewriteCond %{REQUEST_URI} !^/ws$
RewriteCond %{REQUEST_URI} !^/old(/|$)
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
RewriteRule . /index.html [L]

# PWA service worker — never cache; this is what lets the update banner fire.
<Files "sw.js">
    Header set Cache-Control "no-cache, no-store, must-revalidate"
</Files>

# Hashed assets get an aggressive cache; Vite stamps the filename on rebuild.
<FilesMatch "\.(js|css|woff2|png|jpg|svg)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
</FilesMatch>
